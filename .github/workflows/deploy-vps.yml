name: Deploy VPS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-vps.yml'

jobs:
  deploy:
    name: Deploy (VPS)
    runs-on: ubuntu-latest
    steps:
      - name: Clean up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /
      - name: Deploy pawan-web
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/pawan
            git pull origin main
            cargo build --release -p pawan-web
            systemctl restart pawan-web
            sleep 3
            curl -sf http://localhost:3300/api/health | grep -q ok
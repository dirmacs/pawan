name: Deploy server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: Deploy (server)
    runs-on: ubuntu-latest
    steps:
      - name: Clean up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /
      - name: Deploy pawan-api
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/pawan
            git pull origin main
            cargo build --release -p pawan-api
            systemctl restart pawan-api
            sleep 3
            curl -sf http://localhost:3300/api/health | grep -q ok
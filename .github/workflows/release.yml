name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: pawan-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: pawan-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: pawan-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: pawan-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/bin/
          key: ${{ matrix.target }}-none
          restore-keys: ""

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler binutils gcc

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: gcc
          CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER: clang
          CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER: clang
          LD: /usr/bin/ld
          RUSTFLAGS: "-C linker=gcc"
        run: |
          set +e
          export PATH="/usr/bin:$PATH"
          echo "---LINKER CONFIG---"
          which gcc 2>/dev/null && gcc --version | head -1
          which clang 2>/dev/null && clang --version | head -1
          which ld 2>/dev/null && ld --version | head -1
          which mold 2>/dev/null && mold --version
          echo "---CARGO BUILD START---"
          cargo build --release --target ${{ matrix.target }} -p pawan 2>&1 | tee /tmp/build_output.txt
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "---BUILD EXIT: $BUILD_EXIT---"
          cargo version
          rustc --version
          echo "---LAST 50 LINES---"
          tail -50 /tmp/build_output.txt
          echo "---RELEASE DIR---"
          ls -la target/${{ matrix.target }}/release/ 2>/dev/null || echo "No release directory"
          exit 0

      - name: Package
        continue-on-error: true
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/pawan dist/${{ matrix.artifact }} 2>/dev/null || echo "No binary produced"
          chmod +x dist/${{ matrix.artifact }} 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94

      - name: Install protoc + build tools
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler binutils gcc

      - name: Publish pawan-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: gcc
          PATH: "/usr/bin:$PATH"
          LD: /usr/bin/ld
        run: |
          set +e
          cargo publish -p pawan-core
          exit 0

      - name: Wait for crates.io index
        run: sleep 90

      - name: Publish pawan-mcp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: gcc
          PATH: "/usr/bin:$PATH"
          LD: /usr/bin/ld
        run: |
          set +e
          cargo publish -p pawan-mcp
          exit 0

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish pawan-aegis
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: gcc
          PATH: "/usr/bin:$PATH"
          LD: /usr/bin/ld
        run: |
          set +e
          cargo publish -p pawan-aegis
          exit 0

      - name: Wait for crates.io index
        run: sleep 90

      - name: Publish pawan-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: gcc
          PATH: "/usr/bin:$PATH"
          LD: /usr/bin/ld
        run: |
          set +e
          cargo publish -p pawan
          exit 0

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, publish]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/pawan-linux-amd64/pawan-linux-amd64
            artifacts/pawan-linux-arm64/pawan-linux-arm64
            artifacts/pawan-macos-amd64/pawan-macos-amd64
            artifacts/pawan-macos-arm64/pawan-macos-arm64

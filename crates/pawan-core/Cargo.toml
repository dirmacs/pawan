[package]
name = "pawan-core"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Pawan (पवन) — Core library: agent, tools, config, healing"
keywords = ["cli", "coding", "agent", "ai", "self-healing"]
categories = ["command-line-utilities", "development-tools"]

[lib]
name = "pawan"
path = "src/lib.rs"

# [features]
# ares = ["dep:ares-server"]
#
# Ares integration: the backend code exists at src/agent/backend/ares_backend.rs
# and src/tools/ares_bridge.rs but is gated behind #[cfg(feature = "ares")].
# To enable, add to this Cargo.toml:
#   [features] ares = ["dep:ares-server"]
#   [dependencies] ares-server = { path = "/opt/ares", optional = true, ... }
# This is intentionally not declared here because ares-server is a local
# path dependency that doesn't exist in CI or on crates.io.

[lints.rust]
unexpected_cfgs = { level = "allow", check-cfg = ['cfg(feature, values("ares"))'] }

[dependencies]
# Core from workspace
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
futures = { workspace = true }
toml = { workspace = true }

# HTTP client
reqwest = { workspace = true }

# Binary detection for native tools
which = "7"

# Home directory resolution
dirs = "5.0"

# File operations
glob = "0.3"
ignore = "0.4"
walkdir = "2.5"
similar = "2.6"
regex = "1.12"
rand = "0.8"

# Git-backed sessions (conversation trees)
git2 = "0.20"

# Beads-style task tracking (SQLite-backed)
rusqlite = { version = "0.34", features = ["bundled"] }

[dev-dependencies]
tempfile = "3.23"
tokio-test = "0.4"

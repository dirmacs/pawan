[package]
name = "pawan-core"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Pawan (पवन) — Core library: agent, tools, config, healing"
keywords = ["cli", "coding", "agent", "ai", "self-healing"]
categories = ["command-line-utilities", "development-tools"]

[lib]
name = "pawan"
path = "src/lib.rs"

[features]
default = []
ares = ["dep:ares-server"]

[dependencies]
# Ares integration (optional)
ares-server = { version = "0.6", path = "/opt/ares", default-features = false, features = ["openai"], optional = true }
# Core from workspace
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
futures = { workspace = true }
toml = { workspace = true }

# HTTP client
reqwest = { workspace = true }

# File operations
glob = "0.3"
ignore = "0.4"
walkdir = "2.5"
similar = "2.6"
regex = "1.12"

[dev-dependencies]
tempfile = "3.23"
rstest = "0.26"
wiremock = "0.6"
tokio-test = "0.4"

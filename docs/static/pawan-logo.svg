<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="windGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bgGrad)" />

  <!-- Power star (5-point, behind everything) -->
  <polygon points="256,80 278,170 370,170 295,224 318,314 256,264 194,314 217,224 142,170 234,170"
           fill="url(#starGrad)" fill-opacity="0.15" stroke="#f97316" stroke-width="1" stroke-opacity="0.3" />

  <!-- Wind streaks (पवन = wind) -->
  <g stroke="url(#windGrad)" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M110 175 Q180 168 240 175 Q300 182 360 170 Q390 164 410 172" />
    <path d="M100 210 Q170 203 250 212 Q320 220 380 208 Q405 202 420 208" stroke-width="4" />
    <path d="M115 245 Q185 238 260 248 Q330 256 390 244 Q410 238 425 243" stroke-width="3.5" />
    <path d="M125 278 Q195 272 270 280 Q335 287 385 276" stroke-width="2.5" stroke-opacity="0.6" />
  </g>

  <!-- Code brackets -->
  <g fill="none" stroke="url(#codeGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="195,180 155,230 195,280" />
    <polyline points="317,180 357,230 317,280" />
  </g>

  <!-- Cursor blink -->
  <line x1="232" y1="272" x2="280" y2="272" stroke="#58a6ff" stroke-width="4" stroke-linecap="round" />

  <!-- Power core (healing pulse) -->
  <circle cx="256" cy="228" r="6" fill="#f97316" />
  <circle cx="256" cy="228" r="14" fill="none" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.4" />
  <circle cx="256" cy="228" r="24" fill="none" stroke="#f97316" stroke-width="1" stroke-opacity="0.15" />

  <!-- Devanagari: पवन -->
  <text x="256" y="360" text-anchor="middle" font-family="'Noto Sans Devanagari', system-ui, sans-serif"
        font-size="48" font-weight="700" fill="#f97316" letter-spacing="4">पवन</text>

  <!-- PAWAN -->
  <text x="256" y="402" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="36" font-weight="800" fill="#c9d1d9" letter-spacing="12">PAWAN</text>

  <!-- Subtitle -->
  <text x="256" y="432" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="11" font-weight="500" fill="#8b949e" letter-spacing="6">POWER STAR CLI AGENT</text>
</svg>

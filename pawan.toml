# Pawan — MLX-first config
# Primary: Qwen3.5-9B via mlx_lm.server on Mac Mini M4 (Apple Silicon native, ~2x faster than llama.cpp)
# Fallback: NVIDIA NIM StepFun Flash (best tool-call success rate)
provider = "mlx"
model = "mlx-community/Qwen3.5-9B-4bit"
temperature = 0.6
max_tokens = 4096
max_tool_iterations = 20

[cloud]
provider = "nvidia"
model = "step-ai/step-2-flash"

[mcp.daedra]
command = "daedra"
args = ["serve", "--transport", "stdio", "--quiet"]


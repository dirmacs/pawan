# Pawan — NIM cloud primary (Mac local paused — swap-bound, needs reboot)
# Switch back to MLX after Mac reboot by changing provider to "mlx"
provider = "nvidia"
model = "stepfun-ai/step-3.5-flash"
temperature = 0.6
max_tokens = 4096
max_tool_iterations = 20
thinking_budget = 0

# Mac local inference (paused — uncomment to re-enable after reboot)
# provider = "mlx"
# model = "mlx-community/Qwen3.5-4B-MLX-8bit"
# base_url = "http://localhost:8080/v1"

[cloud]
provider = "nvidia"
model = "stepfun-ai/step-3.5-flash"

[mcp.daedra]
command = "daedra"
args = ["serve", "--transport", "stdio", "--quiet"]


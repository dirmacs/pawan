# Pawan — local-first config
# Primary: Qwen3.5-9B via llama.cpp on Mac Mini M4 (free, via aegis-net tunnel)
# Fallback: NVIDIA NIM StepFun Flash (best tool-call success rate)
provider = "openai"
model = "Qwen3.5-9B-Q4_K_M.gguf"
base_url = "http://localhost:8080/v1"
temperature = 0.6
max_tokens = 4096
max_tool_iterations = 20

[cloud]
provider = "nvidia"
model = "step-ai/step-2-flash"

[mcp.daedra]
command = "daedra"
args = ["serve", "--transport", "stdio", "--quiet"]


# Pawan — NIM cloud primary (Qwen3.5 122B + MiniMax M2.5 fallback)
# Qwen3.5 122B: 122B MoE (10B active), 383ms, S tier, thinking mode, tool calling
# MiniMax M2.5: 230B, 374ms, SWE 80.2% — highest coding benchmark on NIM
provider = "nvidia"
model = "qwen/qwen3.5-122b-a10b"
temperature = 0.6
top_p = 0.95
max_tokens = 16384
max_tool_iterations = 20
thinking_budget = 0
reasoning_mode = false

[cloud]
provider = "nvidia"
model = "minimaxai/minimax-m2.5"

[eruka]
enabled = true
url = "http://localhost:8081"
api_key = "dirmacs-service-key-2026-secure"
core_max_tokens = 500

[mcp.daedra]
command = "daedra"
args = ["serve", "--transport", "stdio", "--quiet"]
